<section>
    <a class="teaser-image" href="%path%">
        <img src="%cover%" alt="cover image">
    </a>

    <div class="teaser-text">
        <h3><a href="%path%">%title%</a></h3>
        <p>%description%</p>
        
        <time datetime="%date%">%dateformat%</time>
        
        <ul class="tags">
            %tags%
        </ul>
    </div>
</section>
